---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devsecops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-devsecops
  template:
    metadata:
      labels:
        app: flask-devsecops
    spec:
      containers:
        - name: flask-devsecops
          image: flask-devsecops:latest
          ports:
            - containerPort: 5000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            
